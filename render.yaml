services:
  - type: web
    name: resume-formatter-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    envVars:
      - key: GROQ_API_KEY
        sync: false          # Set this manually in Render dashboard
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PORT
        value: 8000
      - key: CORS_ORIGINS
        sync: false          # Set to your Vercel frontend URL after deploying
    disk:
      name: resume-data
      mountPath: /app/uploads
      sizeGB: 1
